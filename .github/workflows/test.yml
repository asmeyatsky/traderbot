name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.0.1+cpu -f https://download.pytorch.org/whl/cpu/torch_stable.html
          pip install -r requirements-dev.txt

      - name: Run backend tests with coverage
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test_secret_key_for_ci_at_least_32_characters_long
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=50

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type check
        run: npx tsc -b --noEmit
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Run frontend tests
        run: npx vitest run
        working-directory: frontend
