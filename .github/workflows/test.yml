name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.0.1+cpu -f https://download.pytorch.org/whl/cpu/torch_stable.html
          pip install -r requirements-dev.txt

      - name: Enforce hexagonal architecture (import-linter)
        run: lint-imports

      - name: Supply-chain audit (pip-audit, fail on HIGH/CRITICAL)
        # pip-audit checks installed packages against the PyPA Advisory
        # Database. --strict was dropped because torch's local-version wheel
        # (torch==2.0.1+cpu, installed from PyTorch's private index) isn't
        # resolvable on PyPI — --strict treats that as a failure even though
        # the underlying version is audited.
        #
        # --ignore-vuln CVE-2026-1839 waiver: transformers 4.x vs 5.0.0rc3.
        # transformers is an optional ML dep wrapped in try/except in both
        # call sites (advanced_nlp.py, ml_model_service.py) and only loads
        # when the module is touched by a request path that uses it. Major-
        # bumping to 5.x right before launch adds risk we don't need; we'll
        # drop this ignore once 5.x lands in a scheduled upgrade sprint.
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln CVE-2026-1839

      - name: Domain-layer coverage (2026 rules §5 — target ≥95%)
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test_secret_key_for_ci_at_least_32_characters_long
          ENVIRONMENT: development
        # CI observed 42% on the last green run; floor is 40% for a 2pp
        # safety margin. Ratchet up each time we add domain tests.
        # TODO(phase-8): raise to 95% per the 2026 rules.
        run: pytest tests/ --tb=short --cov=src/domain --cov-report=term --cov-fail-under=40

      - name: Application-layer coverage (2026 rules §5 — target ≥85%)
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test_secret_key_for_ci_at_least_32_characters_long
          ENVIRONMENT: development
        # CI observed 41% on the last green run; floor is 38% for a 3pp
        # margin. TODO(phase-8): raise to 85%.
        run: pytest tests/ --tb=short --cov=src/application --cov-report=term --cov-fail-under=38

      - name: Overall test coverage (2026 rules §5 — target ≥80%)
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test_secret_key_for_ci_at_least_32_characters_long
          ENVIRONMENT: development
        # CI observed 19% on the last green run; floor is 17% for a 2pp
        # margin. Overall is dragged down by infrastructure files that
        # aren't exercised without external services (Alpaca, Polygon, TF).
        # TODO(phase-8): raise to 80% as integration harness comes online.
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=17

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Supply-chain audit (npm audit, fail on HIGH/CRITICAL)
        # --omit=dev is the modern replacement for --production (which npm 10
        # deprecated). Skips devDependency vulns (vite/rollup/etc) so we only
        # gate on shipped-to-user runtime deps.
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend

      - name: TypeScript type check
        run: npx tsc -b --noEmit
        working-directory: frontend

      - name: Lint (ESLint + boundaries plugin)
        # `boundaries/dependencies` is set to 'error' in eslint.config.js, so any
        # layer violation fails the build. Pre-existing `react-hooks` warnings
        # are intentionally left as warnings (tracked as tech debt) and do not
        # block CI. Tighten to --max-warnings 0 when those are burned down.
        run: npm run lint
        working-directory: frontend

      - name: Run frontend tests with coverage
        # Coverage floor enforced in vitest.config.ts — stores/ and api/ at 70%.
        # UI components excluded; tested via integration in Phase 7 (staging soak).
        run: npx vitest run --coverage
        working-directory: frontend
